application:
  environment: !env APP_ENV, dev
  debug: !env APP_DEBUG, true

localization:
  locale: "en"
  supported_locales:
    - "en"
  locale_path: "locale"
  timezone: "UTC"

render:
  engine: "latte"
  directory: "app/Views"
  cache: "cache/latte"
  mode: "always"

leaf:
  name: "CodeQuill"
  version: "0.9.0"
  description: "Memory infrastructure for software. Preserve verifiable, immutable evidence of what source code existed at a given point in time and under whose authority."
  github_url: "https://github.com/codequill-claim"
  content_path: "content"
  output_path: "dist"
  base_url: "/docs"
  production_url: "https://codequill.xyz"
  author: "Ophelios Studio"
  author_url: "https://ophelios.com"
  license: "MIT"
  sections:
    getting-started: "Getting Started"
    concepts: "Concepts"
    releases: "Releases & Governance"
    web-application: "Web Application"
    cli-reference: "CLI Reference"
    ci-cd: "CI/CD Integration"
    smart-contracts: "Smart Contracts"
    security: "Security"
    reference: "Reference"
